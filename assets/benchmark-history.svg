<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="repl-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f85149;stop-opacity:0.55" />
      <stop offset="100%" style="stop-color:#f85149;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="verified-rise" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c8ebf;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#3fb950;stop-opacity:0.9" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="380" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="450" y="34" font-family="-apple-system, sans-serif" font-size="16" fill="#e6edf3" text-anchor="middle" font-weight="600">miniF2F valid · verified pass rate</text>
  <text x="450" y="54" font-family="-apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">REPL-only claims (red) vs. lean_prover-gated honest numbers (blue → green)</text>

  <!-- ───────────── Axes ───────────── -->
  <!-- Y-axis -->
  <line x1="90" y1="80" x2="90" y2="300" stroke="#30363d" stroke-width="1.2"/>
  <!-- X-axis -->
  <line x1="90" y1="300" x2="850" y2="300" stroke="#30363d" stroke-width="1.2"/>

  <!-- Y-axis ticks: 0, 25, 50, 75, 100 -->
  <line x1="86" y1="300" x2="94" y2="300" stroke="#484f58" stroke-width="1"/>
  <text x="82" y="304" font-family="'SF Mono', monospace" font-size="10" fill="#484f58" text-anchor="end">0%</text>
  <line x1="86" y1="245" x2="94" y2="245" stroke="#484f58" stroke-width="1"/>
  <text x="82" y="249" font-family="'SF Mono', monospace" font-size="10" fill="#484f58" text-anchor="end">25%</text>
  <line x1="86" y1="190" x2="94" y2="190" stroke="#484f58" stroke-width="1"/>
  <text x="82" y="194" font-family="'SF Mono', monospace" font-size="10" fill="#484f58" text-anchor="end">50%</text>
  <line x1="86" y1="135" x2="94" y2="135" stroke="#484f58" stroke-width="1"/>
  <text x="82" y="139" font-family="'SF Mono', monospace" font-size="10" fill="#484f58" text-anchor="end">75%</text>
  <line x1="86" y1="80" x2="94" y2="80" stroke="#484f58" stroke-width="1"/>
  <text x="82" y="84" font-family="'SF Mono', monospace" font-size="10" fill="#484f58" text-anchor="end">100%</text>

  <!-- Faint horizontal gridlines -->
  <line x1="90" y1="245" x2="850" y2="245" stroke="#30363d" stroke-width="0.5" opacity="0.4"/>
  <line x1="90" y1="190" x2="850" y2="190" stroke="#30363d" stroke-width="0.5" opacity="0.4"/>
  <line x1="90" y1="135" x2="850" y2="135" stroke="#30363d" stroke-width="0.5" opacity="0.4"/>
  <line x1="90" y1="80" x2="850" y2="80" stroke="#30363d" stroke-width="0.5" opacity="0.4"/>

  <!--
    Data points (date, percent):
      Feb 17  v0.2.0          REPL  91.8%
      Feb 18  v0.2.1          REPL  91.8% (test 94.3%)
      Feb 22  audit                  6.2% verified
      Mar 08  v0.2.2          verified  25.8%
      Mar 19  + heuristic search verified  28.6%  (35-problem)
      Apr 01  + HILBERT decomposer verified  50.0% (10-problem)
      Apr 25  proposer-builder-reviewer loop  90.0% (10-problem)
      May 09  same loop  62.9% (35-problem stratified)

    Pixel positions:
      x: Feb 17 → 140, May 09 → 800  (range = 660 over ~82 days)
      y: 0% → 300, 100% → 80  (range = 220 per 100pp)
  -->

  <!-- Inflated REPL band (Feb 17 - Feb 22, the lie) -->
  <rect x="140" y="78" width="60" height="222" fill="url(#repl-fade)" opacity="0.5"/>
  <text x="170" y="73" font-family="'SF Mono', monospace" font-size="9" fill="#f85149" text-anchor="middle">REPL-only era</text>

  <!--
    Honest line (lean_prover-gated) — connect:
      Feb 22 (x=215, y=286)   6.2%
      Mar 08 (x=320, y=243)   25.8%
      Mar 19 (x=400, y=237)   28.6%
      Apr 01 (x=505, y=190)   50.0%
      Apr 25 (x=665, y=102)   90.0%
      May 09 (x=800, y=162)   62.9%
  -->
  <polyline points="215,286 320,243 400,237 505,190 665,102 800,162"
            fill="none" stroke="url(#verified-rise)" stroke-width="2.5" opacity="0.9"/>

  <!-- v0.2.0 / v0.2.1 inflated REPL point (Feb 17-18, 91.8%) -->
  <circle cx="155" cy="98" r="6" fill="#f85149" stroke="#0d1117" stroke-width="1.5"/>
  <text x="155" y="92" font-family="'SF Mono', monospace" font-size="9" fill="#f85149" text-anchor="middle">91.8%</text>
  <text x="155" y="320" font-family="'SF Mono', monospace" font-size="9" fill="#484f58" text-anchor="middle">v0.2.0/.1</text>
  <text x="155" y="334" font-family="'SF Mono', monospace" font-size="8" fill="#484f58" text-anchor="middle">Feb 17-18</text>

  <!-- Strike-through marker on the inflated point -->
  <line x1="143" y1="86" x2="167" y2="110" stroke="#f85149" stroke-width="1.2" opacity="0.6"/>

  <!-- Feb 22 correction (6.2%) -->
  <circle cx="215" cy="286" r="6" fill="#6c8ebf" stroke="#0d1117" stroke-width="1.5"/>
  <text x="215" y="307" font-family="'SF Mono', monospace" font-size="9" fill="#6c8ebf" text-anchor="middle">6.2%</text>
  <text x="215" y="320" font-family="'SF Mono', monospace" font-size="9" fill="#484f58" text-anchor="middle">audit</text>
  <text x="215" y="334" font-family="'SF Mono', monospace" font-size="8" fill="#484f58" text-anchor="middle">Feb 22</text>

  <!-- v0.2.2 (25.8%) -->
  <circle cx="320" cy="243" r="6" fill="#6c8ebf" stroke="#0d1117" stroke-width="1.5"/>
  <text x="320" y="237" font-family="'SF Mono', monospace" font-size="9" fill="#6c8ebf" text-anchor="middle">25.8%</text>
  <text x="320" y="320" font-family="'SF Mono', monospace" font-size="9" fill="#484f58" text-anchor="middle">v0.2.2</text>
  <text x="320" y="334" font-family="'SF Mono', monospace" font-size="8" fill="#484f58" text-anchor="middle">Mar 08</text>

  <!-- 35-problem heuristic (28.6%) -->
  <circle cx="400" cy="237" r="5" fill="#6c8ebf" stroke="#0d1117" stroke-width="1.5"/>
  <text x="400" y="231" font-family="'SF Mono', monospace" font-size="9" fill="#6c8ebf" text-anchor="middle">28.6%</text>
  <text x="400" y="320" font-family="'SF Mono', monospace" font-size="9" fill="#484f58" text-anchor="middle">heuristic</text>
  <text x="400" y="334" font-family="'SF Mono', monospace" font-size="8" fill="#484f58" text-anchor="middle">Mar 19 · 35-prob</text>

  <!-- 10-problem decomposer (50.0%) -->
  <circle cx="505" cy="190" r="5" fill="#6c8ebf" stroke="#0d1117" stroke-width="1.5"/>
  <text x="505" y="184" font-family="'SF Mono', monospace" font-size="9" fill="#6c8ebf" text-anchor="middle">50.0%</text>
  <text x="505" y="320" font-family="'SF Mono', monospace" font-size="9" fill="#484f58" text-anchor="middle">decomposer</text>
  <text x="505" y="334" font-family="'SF Mono', monospace" font-size="8" fill="#484f58" text-anchor="middle">Apr 01 · 10-prob</text>

  <!-- Loop 10-problem (90.0%) -->
  <circle cx="665" cy="102" r="7" fill="#3fb950" stroke="#0d1117" stroke-width="1.5"/>
  <text x="665" y="94" font-family="'SF Mono', monospace" font-size="10" fill="#3fb950" text-anchor="middle" font-weight="600">90.0%</text>
  <text x="665" y="320" font-family="'SF Mono', monospace" font-size="9" fill="#3fb950" text-anchor="middle">loop</text>
  <text x="665" y="334" font-family="'SF Mono', monospace" font-size="8" fill="#484f58" text-anchor="middle">Apr 25 · 10-prob</text>

  <!-- Loop 35-problem (62.9%) -->
  <circle cx="800" cy="162" r="7" fill="#3fb950" stroke="#0d1117" stroke-width="1.5"/>
  <text x="800" y="154" font-family="'SF Mono', monospace" font-size="10" fill="#3fb950" text-anchor="middle" font-weight="600">62.9%</text>
  <text x="800" y="320" font-family="'SF Mono', monospace" font-size="9" fill="#3fb950" text-anchor="middle">loop</text>
  <text x="800" y="334" font-family="'SF Mono', monospace" font-size="8" fill="#484f58" text-anchor="middle">May 09 · 35-prob</text>

  <!-- ───────────── Legend ───────────── -->
  <rect x="90" y="346" width="760" height="24" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>

  <circle cx="106" cy="358" r="5" fill="#f85149"/>
  <text x="118" y="362" font-family="'SF Mono', monospace" font-size="9" fill="#8b949e">REPL-reported (false positives, retracted)</text>

  <circle cx="335" cy="358" r="5" fill="#6c8ebf"/>
  <text x="347" y="362" font-family="'SF Mono', monospace" font-size="9" fill="#8b949e">verified (lean_prover standalone compile)</text>

  <circle cx="565" cy="358" r="6" fill="#3fb950"/>
  <text x="577" y="362" font-family="'SF Mono', monospace" font-size="9" fill="#8b949e">verified (new proposer-builder-reviewer loop · post-Phase 2)</text>
</svg>
