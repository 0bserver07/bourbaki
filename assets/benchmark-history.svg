<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420">
  <defs>
    <linearGradient id="repl-band" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#cf222e;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#cf222e;stop-opacity:0.04" />
    </linearGradient>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0969da;stop-opacity:0.85" />
      <stop offset="60%" style="stop-color:#0969da;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#1a7f37;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="920" height="420" fill="#ffffff" rx="8"/>
  <rect x="1" y="1" width="918" height="418" rx="8" fill="none" stroke="#d0d7de" stroke-width="1"/>

  <!-- Title -->
  <text x="460" y="40" font-family="-apple-system, sans-serif" font-size="20" fill="#1f2328" text-anchor="middle" font-weight="600">miniF2F valid · verified pass rate</text>
  <text x="460" y="62" font-family="-apple-system, sans-serif" font-size="13" fill="#57606a" text-anchor="middle">REPL-only claims (red, retracted) vs. lean_prover-gated honest numbers</text>

  <!-- ───────────── Plot area ───────────── -->
  <!-- (90, 88) to (870, 310): width 780, height 222 -->

  <!-- Faint gridlines + Y-axis labels -->
  <line x1="90" y1="310" x2="870" y2="310" stroke="#d0d7de" stroke-width="1"/>
  <line x1="90" y1="255" x2="870" y2="255" stroke="#eaeef2" stroke-width="1"/>
  <line x1="90" y1="199" x2="870" y2="199" stroke="#eaeef2" stroke-width="1"/>
  <line x1="90" y1="144" x2="870" y2="144" stroke="#eaeef2" stroke-width="1"/>
  <line x1="90" y1="88" x2="870" y2="88" stroke="#eaeef2" stroke-width="1"/>

  <line x1="90" y1="88" x2="90" y2="310" stroke="#d0d7de" stroke-width="1"/>

  <text x="82" y="314" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" fill="#57606a" text-anchor="end">0%</text>
  <text x="82" y="259" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" fill="#57606a" text-anchor="end">25%</text>
  <text x="82" y="203" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" fill="#57606a" text-anchor="end">50%</text>
  <text x="82" y="148" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" fill="#57606a" text-anchor="end">75%</text>
  <text x="82" y="92" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" fill="#57606a" text-anchor="end">100%</text>

  <!--
    Pixel mapping:
      x: Feb 17 → 150, May 09 → 820   (span = 670 over ~82 days)
      y: 0% → 310, 100% → 88   (span 222px per 100pp)

    Points:
      Feb 17-18  REPL  91.8%   x≈165, y≈106
      Feb 22     audit  6.2%   x≈230, y≈296
      Mar 08     v0.2.2 25.8%  x≈350, y≈253
      Mar 19     heuristic 28.6%  x≈445, y≈247
      Apr 01     decomposer 50.0%  x≈555, y≈199
      Apr 25     loop 90.0%  x≈700, y≈110
      May 09     loop 62.9%  x≈820, y≈170
  -->

  <!-- REPL-only inflated band -->
  <rect x="150" y="88" width="80" height="222" fill="url(#repl-band)"/>
  <text x="190" y="80" font-family="-apple-system, sans-serif" font-size="11" fill="#cf222e" text-anchor="middle" font-weight="600">REPL-only era</text>
  <text x="190" y="335" font-family="ui-monospace, 'SF Mono', monospace" font-size="10" fill="#cf222e" text-anchor="middle">retracted</text>

  <!-- Honest verified line -->
  <polyline
    points="230,296 350,253 445,247 555,199 700,110 820,170"
    fill="none" stroke="url(#line-grad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ─────── Data points ─────── -->

  <!-- Feb 17-18: v0.2.0/.1 inflated 91.8% (red, struck-through) -->
  <circle cx="165" cy="106" r="7" fill="#cf222e" stroke="#ffffff" stroke-width="2"/>
  <line x1="155" y1="96" x2="175" y2="116" stroke="#cf222e" stroke-width="2"/>
  <text x="165" y="98" font-family="ui-monospace, 'SF Mono', monospace" font-size="12" fill="#cf222e" text-anchor="middle" font-weight="700">91.8%</text>
  <text x="165" y="365" font-family="-apple-system, sans-serif" font-size="11" fill="#1f2328" text-anchor="middle" font-weight="600">v0.2.0/.1</text>
  <text x="165" y="382" font-family="ui-monospace, 'SF Mono', monospace" font-size="10" fill="#57606a" text-anchor="middle">Feb 17-18</text>

  <!-- Feb 22: audit 6.2% -->
  <circle cx="230" cy="296" r="7" fill="#0969da" stroke="#ffffff" stroke-width="2"/>
  <text x="230" y="318" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" fill="#0969da" text-anchor="middle" font-weight="700">6.2%</text>
  <text x="230" y="365" font-family="-apple-system, sans-serif" font-size="11" fill="#1f2328" text-anchor="middle" font-weight="600">audit</text>
  <text x="230" y="382" font-family="ui-monospace, 'SF Mono', monospace" font-size="10" fill="#57606a" text-anchor="middle">Feb 22</text>

  <!-- Mar 8: v0.2.2 25.8% -->
  <circle cx="350" cy="253" r="7" fill="#0969da" stroke="#ffffff" stroke-width="2"/>
  <text x="350" y="245" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" fill="#0969da" text-anchor="middle" font-weight="700">25.8%</text>
  <text x="350" y="365" font-family="-apple-system, sans-serif" font-size="11" fill="#1f2328" text-anchor="middle" font-weight="600">v0.2.2</text>
  <text x="350" y="382" font-family="ui-monospace, 'SF Mono', monospace" font-size="10" fill="#57606a" text-anchor="middle">Mar 08</text>

  <!-- Mar 19: heuristic 28.6% -->
  <circle cx="445" cy="247" r="6" fill="#0969da" stroke="#ffffff" stroke-width="2"/>
  <text x="445" y="239" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" fill="#0969da" text-anchor="middle" font-weight="700">28.6%</text>
  <text x="445" y="365" font-family="-apple-system, sans-serif" font-size="11" fill="#1f2328" text-anchor="middle" font-weight="600">heuristic</text>
  <text x="445" y="382" font-family="ui-monospace, 'SF Mono', monospace" font-size="10" fill="#57606a" text-anchor="middle">Mar 19 · 35-prob</text>

  <!-- Apr 1: decomposer 50% -->
  <circle cx="555" cy="199" r="6" fill="#0969da" stroke="#ffffff" stroke-width="2"/>
  <text x="555" y="191" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" fill="#0969da" text-anchor="middle" font-weight="700">50.0%</text>
  <text x="555" y="365" font-family="-apple-system, sans-serif" font-size="11" fill="#1f2328" text-anchor="middle" font-weight="600">decomposer</text>
  <text x="555" y="382" font-family="ui-monospace, 'SF Mono', monospace" font-size="10" fill="#57606a" text-anchor="middle">Apr 01 · 10-prob</text>

  <!-- Apr 25: loop 90% -->
  <circle cx="700" cy="110" r="9" fill="#1a7f37" stroke="#ffffff" stroke-width="2.5"/>
  <text x="700" y="100" font-family="ui-monospace, 'SF Mono', monospace" font-size="13" fill="#1a7f37" text-anchor="middle" font-weight="800">90.0%</text>
  <text x="700" y="365" font-family="-apple-system, sans-serif" font-size="11" fill="#1f2328" text-anchor="middle" font-weight="600">new loop</text>
  <text x="700" y="382" font-family="ui-monospace, 'SF Mono', monospace" font-size="10" fill="#57606a" text-anchor="middle">Apr 25 · 10-prob</text>

  <!-- May 9: loop 62.9% -->
  <circle cx="820" cy="170" r="9" fill="#1a7f37" stroke="#ffffff" stroke-width="2.5"/>
  <text x="820" y="160" font-family="ui-monospace, 'SF Mono', monospace" font-size="13" fill="#1a7f37" text-anchor="middle" font-weight="800">62.9%</text>
  <text x="820" y="365" font-family="-apple-system, sans-serif" font-size="11" fill="#1f2328" text-anchor="middle" font-weight="600">new loop</text>
  <text x="820" y="382" font-family="ui-monospace, 'SF Mono', monospace" font-size="10" fill="#57606a" text-anchor="middle">May 09 · 35-prob</text>

  <!-- Legend strip -->
  <rect x="90" y="395" width="780" height="20" rx="6" fill="none"/>
  <circle cx="110" cy="405" r="5" fill="#cf222e"/>
  <text x="122" y="410" font-family="-apple-system, sans-serif" font-size="11" fill="#1f2328">REPL-reported (retracted)</text>

  <circle cx="320" cy="405" r="5" fill="#0969da"/>
  <text x="332" y="410" font-family="-apple-system, sans-serif" font-size="11" fill="#1f2328">verified · lean_prover gate</text>

  <circle cx="540" cy="405" r="6" fill="#1a7f37"/>
  <text x="552" y="410" font-family="-apple-system, sans-serif" font-size="11" fill="#1f2328">verified · post-Phase-2 proposer-builder-reviewer loop</text>
</svg>
