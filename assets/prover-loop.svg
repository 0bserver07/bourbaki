<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540">
  <defs>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0969da"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a7f37"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#bc4c00"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8250df"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cf222e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="920" height="540" fill="#ffffff" rx="8"/>
  <rect x="1" y="1" width="918" height="538" rx="8" fill="none" stroke="#d0d7de" stroke-width="1"/>

  <!-- Title -->
  <text x="460" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" fill="#1f2328" text-anchor="middle" font-weight="600">Proposer · Builder · Reviewer · Memory</text>
  <text x="460" y="64" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#57606a" text-anchor="middle">GLM-5.1 + warm LeanREPLSession + lean_prover final gate · max 50 iterations</text>

  <!-- ═══════════ Forward path (top row) ═══════════ -->

  <!-- ProverState (input) -->
  <rect x="30" y="120" width="150" height="90" rx="10" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="105" y="148" font-family="-apple-system, sans-serif" font-size="14" fill="#1f2328" text-anchor="middle" font-weight="600">ProverState</text>
  <text x="105" y="170" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" fill="#57606a" text-anchor="middle">problem_id</text>
  <text x="105" y="186" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" fill="#57606a" text-anchor="middle">target_theorem</text>
  <text x="105" y="202" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" fill="#57606a" text-anchor="middle">preamble</text>

  <!-- ProverState → Proposer -->
  <line x1="180" y1="165" x2="220" y2="165" stroke="#0969da" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Proposer -->
  <rect x="220" y="120" width="170" height="90" rx="10" fill="#fbf7ff" stroke="#8250df" stroke-width="1.8"/>
  <text x="305" y="148" font-family="-apple-system, sans-serif" font-size="14" fill="#3b2666" text-anchor="middle" font-weight="600">Proposer</text>
  <text x="305" y="170" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" fill="#57606a" text-anchor="middle">GLM-5.1 · Pydantic AI</text>
  <text x="305" y="186" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" fill="#57606a" text-anchor="middle">→ ProverResult JSON</text>
  <text x="305" y="202" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" fill="#57606a" text-anchor="middle">90s call timeout</text>

  <!-- Proposer → Builder -->
  <line x1="390" y1="165" x2="430" y2="165" stroke="#0969da" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="410" y="156" font-family="ui-monospace, 'SF Mono', monospace" font-size="10" fill="#57606a" text-anchor="middle">proposal</text>

  <!-- Builder -->
  <rect x="430" y="120" width="170" height="90" rx="10" fill="#f1f8ff" stroke="#0969da" stroke-width="1.8"/>
  <text x="515" y="148" font-family="-apple-system, sans-serif" font-size="14" fill="#033f86" text-anchor="middle" font-weight="600">Builder</text>
  <text x="515" y="170" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" fill="#57606a" text-anchor="middle">LeanREPLSession</text>
  <text x="515" y="186" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" fill="#57606a" text-anchor="middle">send_cmd → sorries</text>
  <text x="515" y="202" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" fill="#57606a" text-anchor="middle">axiom · apply? scan</text>

  <!-- Builder → Reviewer (build_success) -->
  <line x1="600" y1="165" x2="640" y2="165" stroke="#1a7f37" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="620" y="156" font-family="ui-monospace, 'SF Mono', monospace" font-size="10" fill="#1a7f37" text-anchor="middle" font-weight="600">build_success</text>

  <!-- Reviewer -->
  <rect x="640" y="120" width="170" height="90" rx="10" fill="#fbf7ff" stroke="#8250df" stroke-width="1.8"/>
  <text x="725" y="148" font-family="-apple-system, sans-serif" font-size="14" fill="#3b2666" text-anchor="middle" font-weight="600">Reviewer</text>
  <text x="725" y="170" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" fill="#57606a" text-anchor="middle">GLM-5.1 · ReviewDecision</text>
  <text x="725" y="186" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" fill="#57606a" text-anchor="middle">check₁: stmt unchanged</text>
  <text x="725" y="202" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" fill="#57606a" text-anchor="middle">check₂: no sorry/admit</text>

  <!-- Reviewer → lean_prover (approved) -->
  <line x1="810" y1="165" x2="850" y2="165" stroke="#1a7f37" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="830" y="156" font-family="ui-monospace, 'SF Mono', monospace" font-size="10" fill="#1a7f37" text-anchor="middle" font-weight="600">approved</text>

  <!-- lean_prover (final gate) — vertical -->
  <rect x="850" y="120" width="60" height="90" rx="10" fill="#dafbe1" stroke="#1a7f37" stroke-width="2"/>
  <text x="880" y="152" font-family="-apple-system, sans-serif" font-size="11" fill="#0f5323" text-anchor="middle" font-weight="700">lean</text>
  <text x="880" y="168" font-family="-apple-system, sans-serif" font-size="11" fill="#0f5323" text-anchor="middle" font-weight="700">_prover</text>
  <text x="880" y="186" font-family="ui-monospace, 'SF Mono', monospace" font-size="9" fill="#57606a" text-anchor="middle">final</text>
  <text x="880" y="198" font-family="ui-monospace, 'SF Mono', monospace" font-size="9" fill="#57606a" text-anchor="middle">~60s</text>

  <!-- lean_prover → ProverResult -->
  <line x1="880" y1="210" x2="880" y2="265" stroke="#1a7f37" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- ProverResult -->
  <rect x="800" y="265" width="110" height="64" rx="10" fill="#dafbe1" stroke="#1a7f37" stroke-width="2"/>
  <text x="855" y="289" font-family="-apple-system, sans-serif" font-size="13" fill="#0f5323" text-anchor="middle" font-weight="700">ProverResult</text>
  <text x="855" y="307" font-family="ui-monospace, 'SF Mono', monospace" font-size="10" fill="#57606a" text-anchor="middle">verified = True</text>
  <text x="855" y="321" font-family="ui-monospace, 'SF Mono', monospace" font-size="10" fill="#57606a" text-anchor="middle">final_proof_code</text>

  <!-- ═══════════ Failure / retry paths (down into Memory) ═══════════ -->

  <!-- Builder failures (down) -->
  <line x1="515" y1="210" x2="515" y2="278" stroke="#bc4c00" stroke-width="1.8" marker-end="url(#arr-orange)" stroke-dasharray="6,4"/>
  <rect x="380" y="232" width="160" height="36" rx="6" fill="#fff8f1" stroke="#ffd8a5" stroke-width="1"/>
  <text x="460" y="247" font-family="ui-monospace, 'SF Mono', monospace" font-size="10" fill="#5b3d00" text-anchor="middle">build_failed</text>
  <text x="460" y="261" font-family="ui-monospace, 'SF Mono', monospace" font-size="10" fill="#5b3d00" text-anchor="middle">sorries · axiom · search_tactics</text>

  <!-- Reviewer rejection (curves down-left to Memory) -->
  <path d="M 725 210 Q 725 250 645 280 Q 620 295 580 305" stroke="#bc4c00" stroke-width="1.8" fill="none" marker-end="url(#arr-orange)" stroke-dasharray="6,4"/>
  <text x="700" y="252" font-family="ui-monospace, 'SF Mono', monospace" font-size="10" fill="#bc4c00" text-anchor="middle" font-weight="600">review_rejected</text>
  <text x="700" y="266" font-family="ui-monospace, 'SF Mono', monospace" font-size="9" fill="#bc4c00" text-anchor="middle">or final lean_prover fail</text>

  <!-- Proposer parse failure (down-right) -->
  <path d="M 305 210 Q 305 240 360 270 Q 385 285 405 300" stroke="#bc4c00" stroke-width="1.5" fill="none" marker-end="url(#arr-orange)" stroke-dasharray="4,3"/>
  <text x="245" y="247" font-family="ui-monospace, 'SF Mono', monospace" font-size="9" fill="#bc4c00" text-anchor="start">parsing_failed</text>

  <!-- Memory -->
  <rect x="380" y="280" width="200" height="84" rx="10" fill="#fbf7ff" stroke="#8250df" stroke-width="1.8"/>
  <text x="480" y="306" font-family="-apple-system, sans-serif" font-size="14" fill="#3b2666" text-anchor="middle" font-weight="600">Memory</text>
  <text x="480" y="326" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" fill="#57606a" text-anchor="middle">Memoryless / PreviousK /</text>
  <text x="480" y="341" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" fill="#57606a" text-anchor="middle">Experience  ·  summarises</text>
  <text x="480" y="356" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" fill="#57606a" text-anchor="middle">→ &lt;experience&gt; block</text>

  <!-- Memory → Proposer (purple, dashed, curves up-left) -->
  <path d="M 380 322 Q 240 322 240 250 Q 240 210 285 210" stroke="#8250df" stroke-width="1.8" fill="none" marker-end="url(#arr-purple)" stroke-dasharray="6,4"/>
  <text x="250" y="278" font-family="ui-monospace, 'SF Mono', monospace" font-size="10" fill="#8250df" text-anchor="start" font-weight="600">retry · iter++</text>

  <!-- ═══════════ Terminal exit (max_iterations) ═══════════ -->
  <!-- Proposer can also emit a terminal max_iterations FeedbackMessage that ends the loop -->
  <path d="M 305 120 Q 305 95 130 95 Q 80 95 80 120" stroke="#cf222e" stroke-width="1.5" fill="none" marker-end="url(#arr-red)" stroke-dasharray="5,4"/>
  <text x="195" y="88" font-family="ui-monospace, 'SF Mono', monospace" font-size="10" fill="#cf222e" text-anchor="middle" font-weight="600">max_iterations · terminal → loop ends</text>

  <!-- ═══════════ Legend (bottom) ═══════════ -->
  <rect x="30" y="395" width="860" height="120" rx="10" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="46" y="420" font-family="-apple-system, sans-serif" font-size="13" fill="#1f2328" font-weight="600">Edges</text>

  <!-- Edge legend rows -->
  <line x1="46" y1="438" x2="78" y2="438" stroke="#0969da" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="88" y="442" font-family="-apple-system, sans-serif" font-size="12" fill="#1f2328">forward (data flow)</text>

  <line x1="46" y1="460" x2="78" y2="460" stroke="#1a7f37" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="88" y="464" font-family="-apple-system, sans-serif" font-size="12" fill="#1f2328">success · build_success · approved · verified</text>

  <line x1="46" y1="482" x2="78" y2="482" stroke="#bc4c00" stroke-width="1.8" marker-end="url(#arr-orange)" stroke-dasharray="6,4"/>
  <text x="88" y="486" font-family="-apple-system, sans-serif" font-size="12" fill="#1f2328">retry · routed through Memory</text>

  <line x1="46" y1="504" x2="78" y2="504" stroke="#8250df" stroke-width="1.8" marker-end="url(#arr-purple)" stroke-dasharray="6,4"/>
  <text x="88" y="508" font-family="-apple-system, sans-serif" font-size="12" fill="#1f2328">memory → next proposer call</text>

  <!-- Stats panel (right half of legend) -->
  <line x1="460" y1="410" x2="460" y2="505" stroke="#d0d7de" stroke-width="1"/>
  <text x="478" y="420" font-family="-apple-system, sans-serif" font-size="13" fill="#1f2328" font-weight="600">Verified miniF2F (lean_prover gate)</text>

  <text x="478" y="446" font-family="-apple-system, sans-serif" font-size="12" fill="#57606a">10-problem subset</text>
  <text x="640" y="446" font-family="ui-monospace, 'SF Mono', monospace" font-size="13" fill="#1a7f37" font-weight="700">9 / 10 · 90.0%</text>
  <text x="760" y="446" font-family="-apple-system, sans-serif" font-size="11" fill="#57606a">0 false positives</text>

  <text x="478" y="470" font-family="-apple-system, sans-serif" font-size="12" fill="#57606a">35-problem stratified</text>
  <text x="640" y="470" font-family="ui-monospace, 'SF Mono', monospace" font-size="13" fill="#1a7f37" font-weight="700">22 / 35 · 62.9%</text>
  <text x="760" y="470" font-family="-apple-system, sans-serif" font-size="11" fill="#57606a">0 false positives</text>

  <text x="478" y="494" font-family="-apple-system, sans-serif" font-size="12" fill="#57606a">Prior decomposer baseline</text>
  <text x="640" y="494" font-family="ui-monospace, 'SF Mono', monospace" font-size="13" fill="#6e7781" font-weight="600">10 / 35 · 28.6%</text>
  <text x="760" y="494" font-family="-apple-system, sans-serif" font-size="11" fill="#57606a">same subset · Mar 19</text>
</svg>
