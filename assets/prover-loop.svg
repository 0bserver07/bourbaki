<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6c8ebf" opacity="0.85"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b8a9c9" opacity="0.85"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3fb950" opacity="0.9"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d29922" opacity="0.85"/>
    </marker>
    <marker id="arrow-coral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f85149" opacity="0.85"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="450" y="36" font-family="-apple-system, sans-serif" font-size="16" fill="#e6edf3" text-anchor="middle" font-weight="600">Proposer · Builder · Reviewer · Memory</text>
  <text x="450" y="56" font-family="-apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">GLM-5.1 + warm LeanREPLSession + lean_prover final gate · max 50 iterations</text>

  <!-- ───────────── Forward path (top row, y≈140) ───────────── -->

  <!-- ProverState (input) -->
  <rect x="30" y="120" width="130" height="80" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="95" y="142" font-family="-apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle" font-weight="600">ProverState</text>
  <text x="95" y="160" font-family="'SF Mono', monospace" font-size="9" fill="#484f58" text-anchor="middle">problem_id</text>
  <text x="95" y="173" font-family="'SF Mono', monospace" font-size="9" fill="#484f58" text-anchor="middle">target_theorem</text>
  <text x="95" y="186" font-family="'SF Mono', monospace" font-size="9" fill="#484f58" text-anchor="middle">preamble · messages</text>

  <!-- arrow to Proposer -->
  <line x1="160" y1="160" x2="195" y2="160" stroke="#6c8ebf" stroke-width="1.6" marker-end="url(#arrow-blue)" opacity="0.85"/>

  <!-- Proposer -->
  <rect x="195" y="120" width="155" height="80" rx="8" fill="#161b22" stroke="#b8a9c9" stroke-width="1.5"/>
  <text x="272" y="142" font-family="-apple-system, sans-serif" font-size="11" fill="#b8a9c9" text-anchor="middle" font-weight="600">Proposer</text>
  <text x="272" y="160" font-family="'SF Mono', monospace" font-size="9" fill="#484f58" text-anchor="middle">GLM-5.1 (Pydantic AI)</text>
  <text x="272" y="173" font-family="'SF Mono', monospace" font-size="9" fill="#484f58" text-anchor="middle">→ ProverResult JSON</text>
  <text x="272" y="186" font-family="'SF Mono', monospace" font-size="9" fill="#484f58" text-anchor="middle">90s asyncio cap</text>

  <!-- arrow to Builder -->
  <line x1="350" y1="160" x2="385" y2="160" stroke="#6c8ebf" stroke-width="1.6" marker-end="url(#arrow-blue)" opacity="0.85"/>
  <text x="367" y="153" font-family="'SF Mono', monospace" font-size="8" fill="#484f58" text-anchor="middle">ProposalMessage</text>

  <!-- Builder -->
  <rect x="385" y="120" width="155" height="80" rx="8" fill="#161b22" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="462" y="142" font-family="-apple-system, sans-serif" font-size="11" fill="#6c8ebf" text-anchor="middle" font-weight="600">Builder</text>
  <text x="462" y="160" font-family="'SF Mono', monospace" font-size="9" fill="#484f58" text-anchor="middle">LeanREPLSession</text>
  <text x="462" y="173" font-family="'SF Mono', monospace" font-size="9" fill="#484f58" text-anchor="middle">send_cmd → sorries</text>
  <text x="462" y="186" font-family="'SF Mono', monospace" font-size="9" fill="#484f58" text-anchor="middle">scan: axiom · apply?</text>

  <!-- arrow to Reviewer (build_success) -->
  <line x1="540" y1="160" x2="575" y2="160" stroke="#3fb950" stroke-width="1.6" marker-end="url(#arrow-green)" opacity="0.9"/>
  <text x="557" y="153" font-family="'SF Mono', monospace" font-size="8" fill="#3fb950" text-anchor="middle">build_success</text>

  <!-- Reviewer -->
  <rect x="575" y="120" width="155" height="80" rx="8" fill="#161b22" stroke="#b8a9c9" stroke-width="1.5"/>
  <text x="652" y="142" font-family="-apple-system, sans-serif" font-size="11" fill="#b8a9c9" text-anchor="middle" font-weight="600">Reviewer</text>
  <text x="652" y="160" font-family="'SF Mono', monospace" font-size="9" fill="#484f58" text-anchor="middle">GLM-5.1 (Pydantic AI)</text>
  <text x="652" y="173" font-family="'SF Mono', monospace" font-size="9" fill="#484f58" text-anchor="middle">check₁ ∧ check₂</text>
  <text x="652" y="186" font-family="'SF Mono', monospace" font-size="9" fill="#484f58" text-anchor="middle">stmt unchanged · no sorry</text>

  <!-- arrow to verify -->
  <line x1="730" y1="160" x2="765" y2="160" stroke="#3fb950" stroke-width="1.6" marker-end="url(#arrow-green)" opacity="0.9"/>
  <text x="747" y="153" font-family="'SF Mono', monospace" font-size="8" fill="#3fb950" text-anchor="middle">approved</text>

  <!-- lean_prover final gate -->
  <rect x="765" y="120" width="105" height="80" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.8"/>
  <text x="817" y="142" font-family="-apple-system, sans-serif" font-size="11" fill="#3fb950" text-anchor="middle" font-weight="600">lean_prover</text>
  <text x="817" y="160" font-family="'SF Mono', monospace" font-size="9" fill="#484f58" text-anchor="middle">standalone</text>
  <text x="817" y="173" font-family="'SF Mono', monospace" font-size="9" fill="#484f58" text-anchor="middle">file compile</text>
  <text x="817" y="186" font-family="'SF Mono', monospace" font-size="9" fill="#484f58" text-anchor="middle">~30-90s · once</text>

  <!-- ───────────── Failure / retry paths (curving down) ───────────── -->

  <!-- Builder failure paths going down to Memory -->
  <path d="M 462 200 L 462 245 L 462 280" stroke="#d29922" stroke-width="1.4" fill="none" marker-end="url(#arrow-orange)" opacity="0.8" stroke-dasharray="5,3"/>
  <text x="476" y="225" font-family="'SF Mono', monospace" font-size="8" fill="#d29922" text-anchor="start">build_failed</text>
  <text x="476" y="240" font-family="'SF Mono', monospace" font-size="8" fill="#d29922" text-anchor="start">sorries_goal_state</text>
  <text x="476" y="255" font-family="'SF Mono', monospace" font-size="8" fill="#d29922" text-anchor="start">axiom_detected</text>
  <text x="476" y="270" font-family="'SF Mono', monospace" font-size="8" fill="#d29922" text-anchor="start">search_tactics</text>

  <!-- Reviewer rejection path -->
  <path d="M 652 200 Q 652 250 562 280" stroke="#d29922" stroke-width="1.4" fill="none" marker-end="url(#arrow-orange)" opacity="0.8" stroke-dasharray="5,3"/>
  <text x="662" y="240" font-family="'SF Mono', monospace" font-size="8" fill="#d29922" text-anchor="start">review_rejected</text>
  <text x="662" y="254" font-family="'SF Mono', monospace" font-size="8" fill="#d29922" text-anchor="start">(or final lean_prover fail)</text>

  <!-- Memory box (center) -->
  <rect x="385" y="280" width="170" height="80" rx="8" fill="#161b22" stroke="#b8a9c9" stroke-width="1.5"/>
  <text x="470" y="302" font-family="-apple-system, sans-serif" font-size="11" fill="#b8a9c9" text-anchor="middle" font-weight="600">Memory</text>
  <text x="470" y="320" font-family="'SF Mono', monospace" font-size="9" fill="#484f58" text-anchor="middle">Memoryless / PreviousK /</text>
  <text x="470" y="332" font-family="'SF Mono', monospace" font-size="9" fill="#484f58" text-anchor="middle">Experience  ↓ summarize</text>
  <text x="470" y="348" font-family="'SF Mono', monospace" font-size="9" fill="#484f58" text-anchor="middle">→ &lt;experience&gt; block</text>

  <!-- Memory → Proposer (return arc) -->
  <path d="M 385 320 Q 280 320 272 200" stroke="#b8a9c9" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)" opacity="0.7" stroke-dasharray="5,3"/>
  <text x="290" y="305" font-family="'SF Mono', monospace" font-size="8" fill="#b8a9c9" text-anchor="start">retry · iter++</text>

  <!-- Parsing-failure retry (Proposer back to itself via Memory) -->
  <path d="M 272 200 Q 272 230 320 245 Q 360 260 385 295" stroke="#d29922" stroke-width="1.2" fill="none" marker-end="url(#arrow-orange)" opacity="0.5" stroke-dasharray="3,3"/>
  <text x="305" y="263" font-family="'SF Mono', monospace" font-size="8" fill="#d29922" text-anchor="start">structured_output_parsing_failed</text>

  <!-- ───────────── Terminal exits ───────────── -->

  <!-- max_iterations / missing_target → end -->
  <path d="M 272 120 Q 272 90 350 90 Q 600 90 730 90 Q 817 90 817 120" stroke="#f85149" stroke-width="1.2" fill="none" marker-end="url(#arrow-coral)" opacity="0.6" stroke-dasharray="4,3"/>
  <text x="545" y="83" font-family="'SF Mono', monospace" font-size="8" fill="#f85149" text-anchor="middle">max_iterations · missing_target_theorem (terminal)</text>

  <!-- lean_prover output → ProverResult -->
  <line x1="817" y1="200" x2="817" y2="395" stroke="#3fb950" stroke-width="1.6" marker-end="url(#arrow-green)" opacity="0.9"/>

  <!-- ProverResult -->
  <rect x="745" y="395" width="145" height="65" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.8"/>
  <text x="817" y="416" font-family="-apple-system, sans-serif" font-size="11" fill="#3fb950" text-anchor="middle" font-weight="600">ProverResult</text>
  <text x="817" y="433" font-family="'SF Mono', monospace" font-size="9" fill="#484f58" text-anchor="middle">verified=True</text>
  <text x="817" y="446" font-family="'SF Mono', monospace" font-size="9" fill="#484f58" text-anchor="middle">final_proof_code</text>

  <!-- ───────────── Routing legend (bottom-left) ───────────── -->
  <rect x="30" y="395" width="270" height="100" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="45" y="415" font-family="-apple-system, sans-serif" font-size="11" fill="#8b949e" font-weight="600">Routing rules</text>

  <!-- legend rows -->
  <line x1="45" y1="430" x2="65" y2="430" stroke="#3fb950" stroke-width="1.8" marker-end="url(#arrow-green)" opacity="0.9"/>
  <text x="74" y="434" font-family="'SF Mono', monospace" font-size="9" fill="#8b949e">success / build_success / approved</text>

  <line x1="45" y1="448" x2="65" y2="448" stroke="#d29922" stroke-width="1.4" marker-end="url(#arrow-orange)" opacity="0.85" stroke-dasharray="5,3"/>
  <text x="74" y="452" font-family="'SF Mono', monospace" font-size="9" fill="#8b949e">retry · memory updates experience</text>

  <line x1="45" y1="466" x2="65" y2="466" stroke="#b8a9c9" stroke-width="1.5" marker-end="url(#arrow-purple)" opacity="0.85" stroke-dasharray="5,3"/>
  <text x="74" y="470" font-family="'SF Mono', monospace" font-size="9" fill="#8b949e">memory → next proposer call</text>

  <line x1="45" y1="484" x2="65" y2="484" stroke="#f85149" stroke-width="1.2" marker-end="url(#arrow-coral)" opacity="0.85" stroke-dasharray="4,3"/>
  <text x="74" y="488" font-family="'SF Mono', monospace" font-size="9" fill="#8b949e">terminal feedback · loop ends</text>

  <!-- ───────────── Stat panel (bottom-right) ───────────── -->
  <rect x="320" y="395" width="410" height="100" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="335" y="415" font-family="-apple-system, sans-serif" font-size="11" fill="#8b949e" font-weight="600">Verified miniF2F (lean_prover gate)</text>

  <text x="345" y="438" font-family="'SF Mono', monospace" font-size="10" fill="#484f58">10-problem subset</text>
  <text x="500" y="438" font-family="'SF Mono', monospace" font-size="10" fill="#3fb950">9/10 · 90.0%</text>
  <text x="615" y="438" font-family="'SF Mono', monospace" font-size="9" fill="#484f58">0 false positives</text>

  <text x="345" y="458" font-family="'SF Mono', monospace" font-size="10" fill="#484f58">35-problem stratified</text>
  <text x="500" y="458" font-family="'SF Mono', monospace" font-size="10" fill="#3fb950">22/35 · 62.9%</text>
  <text x="615" y="458" font-family="'SF Mono', monospace" font-size="9" fill="#484f58">0 false positives</text>

  <text x="345" y="478" font-family="'SF Mono', monospace" font-size="10" fill="#484f58">Decomposer baseline</text>
  <text x="500" y="478" font-family="'SF Mono', monospace" font-size="10" fill="#8b949e">10/35 · 28.6%</text>
  <text x="615" y="478" font-family="'SF Mono', monospace" font-size="9" fill="#484f58">Mar 19 — same subset</text>
</svg>
